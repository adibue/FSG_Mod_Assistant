<!DOCTYPE html>
<html>
<head>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
	<link rel="stylesheet" href="inc/bootstrap.min.css">
	<link rel="stylesheet" href="inc/fsico.css">
	<script src="inc/bootstrap.bundle.min.js"></script>
	<script src="renderJS/util/util_lib.js"></script>
	<script src="renderJS/update_ui.js"></script>
	<style>
		.btn-group-win_ui {
			height: 23px;
			left : auto;
			right: 123px;
		}
		.btn-win_ui { height: 25px; }

		.btn-base-ui {
			--bs-btn-color: var(--bs-tertiary-color);
			--bs-btn-bg: var(--bs-tertiary-bg);
			--bs-btn-border-color: var(--bs-tertiary-bg);
			--bs-btn-hover-color: var(--bs-tertiary-color);
			--bs-btn-hover-bg: #5c636a;
			--bs-btn-hover-border-color: #565e64;
			--bs-btn-focus-shadow-rgb: 130,138,145;
			--bs-btn-active-color: #fff;
			--bs-btn-active-bg: #565e64;
			--bs-btn-active-border-color: #51585e;
			--bs-btn-active-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.125);
			--bs-btn-disabled-color: #fff;
			--bs-btn-disabled-bg: #6c757d;
			--bs-btn-disabled-border-color: #6c757d;
		}

		.collection-list {
			list-style-type: none;
		}
	</style>
</head>
<body data-bs-theme="dark" class="overflow-custom2">
	<div class="container-fluid px-1 user-select-none">
		<div class="sticky-top pb-2 bg-body border-bottom mb-3">
			<div class="row w-100 g-0" style="-webkit-app-region: drag;">
				<div class="col-7 pt-2">
					<i18n-text class="h2 ps-2 mastHead" data-key="app_name"></i18n-text>
				</div>
				<div class="col-5 pt-4 mt-3">
					<i18n-text class="badge bg-warning text-dark mx-auto w-100 d-block rounded-3 h4 fs-5" data-key="update_list_window"></i18n-text>
				</div>
			</div>
		</div>

		<div class="mx-2 mb-3 alert alert-secondary" id="updateStatus">
			<i18n-text data-key="update_list_checking"></i18n-text>
		</div>
		<div class="mx-2 mb-3 d-none" id="selectionControls">
			<div class="btn-group w-100">
				<button class="btn btn-outline-success" type="button" id="selectAllButton">
					<i18n-text data-key="update_list_select_all"></i18n-text>
				</button>
				<button class="btn btn-outline-secondary" type="button" id="selectNoneButton">
					<i18n-text data-key="update_list_select_none"></i18n-text>
				</button>
				<button class="btn btn-secondary disabled" type="button" id="selectedCount">
					<i18n-text data-key="update_list_selected"></i18n-text> 0
				</button>
			</div>
		</div>
		<div class="list-group mx-2 my-3" id="modList"></div>
	</div>


<template id="update_line">
	<li class="list-group-item d-flex">
		<div class="d-flex flex-row w-100 justify-content-between">
			<div class="col-2 d-flex align-items-center p-0 me-3">
				<input class="form-check-input update-select-checkbox me-3" type="checkbox" aria-label="Select update candidate">
				<div style="width:64px; height:64px;">
					<template-var>iconImage</template-var>
				</div>
			</div>
			<div class="col-5">
				<div class="fw-bold"><template-var>shortName</template-var></div>
				<div class="small ps-2 fst-italic"><template-var>realName</template-var></div>
				<div class="small ps-2 mt-2"><ul class="collection-list"><template-var>collections</template-var></ul></div>
			</div>
			<div class="col-5 text-end">
				<div class="d-flex flex-wrap fs-5 justify-content-end gap-1 mb-2">
					<span class="badge text-bg-secondary"><i18n-text data-key="update_list_local"></i18n-text> <template-var>localVersion</template-var></span>
					<span class="badge text-bg-warning"><i18n-text data-key="update_source_github"></i18n-text> <template-var>githubVersion</template-var></span>
				</div>
				<div class="small mb-3"><template-var>statusText</template-var></div>
				<button class="btn btn-primary btn-sm w-75 update-source-button" type="button">
					Open Source
				</button>
			</div>
		</div>
	</li>
</template>

</body>
</html>
