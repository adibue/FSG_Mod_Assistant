<!DOCTYPE html>
<html>
<head>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
	<link rel="stylesheet" href="inc/bootstrap.min.css">
	<link rel="stylesheet" href="inc/fsico.css">
	<script src="inc/bootstrap.bundle.min.js"></script>
	<script src="renderJS/util/util_lib.js"></script>
	<script src="renderJS/update_ui.js"></script>
	<style>
		.btn-group-win_ui {
			height: 23px;
			left : auto;
			right: 123px;
		}
		.btn-win_ui { height: 25px; }

		.btn-base-ui {
			--bs-btn-color: var(--bs-tertiary-color);
			--bs-btn-bg: var(--bs-tertiary-bg);
			--bs-btn-border-color: var(--bs-tertiary-bg);
			--bs-btn-hover-color: var(--bs-tertiary-color);
			--bs-btn-hover-bg: #5c636a;
			--bs-btn-hover-border-color: #565e64;
			--bs-btn-focus-shadow-rgb: 130,138,145;
			--bs-btn-active-color: #fff;
			--bs-btn-active-bg: #565e64;
			--bs-btn-active-border-color: #51585e;
			--bs-btn-active-shadow: inset 0 3px 5px rgba(0, 0, 0, 0.125);
			--bs-btn-disabled-color: #fff;
			--bs-btn-disabled-bg: #6c757d;
			--bs-btn-disabled-border-color: #6c757d;
		}

		.collection-list {
			list-style-type: none;
		}
	</style>
</head>
<body data-bs-theme="dark" class="overflow-custom2">
	<div class="container-fluid px-1 user-select-none">
		<div class="sticky-top pb-2 bg-body border-bottom mb-3">
			<div class="row w-100 g-0" style="-webkit-app-region: drag;">
				<div class="col-7 pt-2">
					<i18n-text class="h2 ps-2 mastHead" data-key="app_name"></i18n-text>
				</div>
				<div class="col-5 pt-4 mt-3">
					<i18n-text class="badge bg-warning text-dark mx-auto w-100 d-block rounded-3 h4 fs-5" data-key="update_list_window"></i18n-text>
					<div class="small text-center text-body-secondary mt-1" id="updateCollectionContext"></div>
				</div>
			</div>
			<button class="btn btn-success w-100 mt-2" type="button" id="openSelectedButton" disabled>
				<i18n-text data-key="update_list_open_selected"></i18n-text>
			</button>
			<button class="btn btn-warning w-100 mt-2" type="button" id="downloadSelectedButton" disabled>
				<i18n-text data-key="update_list_download_selected"></i18n-text>
			</button>
			<button class="btn btn-secondary w-100 mt-2" type="button" id="historyButton">
				<i18n-text data-key="history_window"></i18n-text>
			</button>
			<button class="btn btn-secondary w-100 mt-2" type="button" id="vaultButton">
				Mod Vault
			</button>
			<button class="btn btn-outline-info w-100 mt-2" type="button" id="refreshUpdatesButton">
				Refresh update checks
			</button>
			<button class="btn btn-outline-light w-100 mt-2" type="button" id="manifestToggleButton">
				Share or import a collection
			</button>
		</div>

		<section class="mx-2 mb-3 card d-none" id="manifestPanel">
			<div class="card-body">
				<h2 class="h5">Shareable collection manifest</h2>
				<p class="small text-body-secondary">The manifest contains mod names and trusted source references, not the mod ZIP files.</p>
				<label class="form-label" for="manifestCollection">Collection</label>
				<select class="form-select mb-3" id="manifestCollection"></select>
				<div class="row g-2 mb-3">
					<div class="col-md-3"><button class="btn btn-outline-primary w-100" type="button" id="manifestExportFile">Export file</button></div>
					<div class="col-md-3"><button class="btn btn-outline-primary w-100" type="button" id="manifestCopyLink">Copy share link</button></div>
					<div class="col-md-3"><button class="btn btn-outline-success w-100" type="button" id="manifestImportFile">Import file</button></div>
					<div class="col-md-3"><button class="btn btn-outline-success w-100" type="button" id="manifestImportLink">Import copied link</button></div>
				</div>
				<div class="alert alert-secondary py-2" id="manifestStatus">Choose an export or import action.</div>
				<div class="d-none" id="manifestPreview">
					<div class="d-flex flex-wrap justify-content-between align-items-center gap-2 mb-2">
						<div class="fw-bold" id="manifestTitle"></div>
						<div class="btn-group me-auto">
							<button class="btn btn-sm btn-secondary active" type="button" id="manifestShowAll">Show all</button>
							<button class="btn btn-sm btn-outline-danger" type="button" id="manifestShowAttention">Show manual or missing</button>
						</div>
						<div class="btn-group">
							<button class="btn btn-sm btn-outline-success" type="button" id="manifestSelectAll">Select downloadable</button>
							<button class="btn btn-sm btn-outline-secondary" type="button" id="manifestSelectNone">Select none</button>
						</div>
					</div>
					<div class="small mb-2" id="manifestSummary"></div>
					<button class="btn btn-warning w-100 mb-3" type="button" id="manifestInstall" disabled>Install selected mods into the chosen collection</button>
					<div class="list-group" id="manifestList"></div>
				</div>
			</div>
		</section>

		<div class="mx-2 mb-3 alert alert-secondary" id="updateStatus">
			<i18n-text data-key="update_list_checking"></i18n-text>
		</div>
		<div class="mx-2 mb-3 d-none" id="selectionControls">
			<div class="btn-group w-100">
				<button class="btn btn-outline-success" type="button" id="selectAllButton">
					<i18n-text data-key="update_list_select_all"></i18n-text>
				</button>
				<button class="btn btn-outline-secondary" type="button" id="selectNoneButton">
					<i18n-text data-key="update_list_select_none"></i18n-text>
				</button>
				<button class="btn btn-secondary disabled" type="button" id="selectedCount">
					<i18n-text data-key="update_list_selected"></i18n-text> 0
				</button>
			</div>
		</div>
		<div class="list-group mx-2 my-3" id="modList"></div>
	</div>


<template id="update_line">
	<li class="list-group-item d-flex">
		<div class="d-flex flex-row w-100 justify-content-between">
			<div class="col-2 d-flex align-items-center p-0 me-3">
				<input class="form-check-input update-select-checkbox me-3" type="checkbox" aria-label="Select update candidate">
				<div style="width:64px; height:64px;">
					<template-var>iconImage</template-var>
				</div>
			</div>
			<div class="col-5">
				<div class="fw-bold"><template-var>shortName</template-var></div>
				<div class="small ps-2 fst-italic"><template-var>realName</template-var></div>
				<div class="small ps-2 mt-2"><ul class="collection-list"><template-var>collections</template-var></ul></div>
			</div>
			<div class="col-5 text-end">
				<div class="d-flex flex-wrap fs-5 justify-content-end gap-1 mb-2">
					<span class="badge text-bg-secondary"><i18n-text data-key="update_list_local"></i18n-text> <template-var>localVersion</template-var></span>
					<span class="badge text-bg-warning"><template-var>sourceName</template-var> <template-var>remoteVersion</template-var></span>
				</div>
				<div class="small mb-3"><template-var>statusText</template-var></div>
				<div class="small mb-3"><template-var>downloadStatus</template-var></div>
				<button class="btn btn-primary btn-sm w-75 update-source-button" type="button">
					<i18n-text data-key="update_list_open_source"></i18n-text>
				</button>
			</div>
		</div>
	</li>
</template>

<template id="manifest_line">
	<div class="list-group-item d-flex align-items-start gap-3 manifest-row">
		<input class="form-check-input manifest-select mt-1" type="checkbox" aria-label="Select shared mod">
		<div class="flex-grow-1">
			<div class="d-flex flex-wrap justify-content-between gap-2">
				<div class="fw-bold"><template-var>modName</template-var></div>
				<div><template-var>stateBadge</template-var></div>
			</div>
			<div class="small text-body-secondary"><template-var>versions</template-var></div>
			<div class="small"><template-var>detail</template-var></div>
			<button class="btn btn-sm btn-outline-primary mt-2 manifest-source-button d-none" type="button">Open source page</button>
		</div>
	</div>
</template>

</body>
</html>
