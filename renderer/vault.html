<!DOCTYPE html>
<html>
<head>

	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline';">
	<link rel="stylesheet" href="inc/bootstrap.min.css">
	<link rel="stylesheet" href="inc/fsico.css">
	<script src="inc/bootstrap.bundle.min.js"></script>
	<script src="renderJS/util/util_lib.js"></script>
	<script src="renderJS/vault_ui.js"></script>
	<style>
		.vault-path {
			word-break: break-all;
		}
		.vault-group-body {
			margin-left: 1.75rem;
		}
		.vault-mod-logo {
			width: 4.25rem;
			height: 4.25rem;
			object-fit: contain;
			background: rgba(0, 0, 0, 0.18);
			border: 1px solid var(--bs-border-color);
			border-radius: 0.5rem;
			padding: 0.25rem;
		}
		.vault-note-preview {
			max-height: 4.5em;
			overflow: hidden;
			white-space: pre-wrap;
		}
	</style>
</head>
<body data-bs-theme="dark" class="overflow-custom2">
	<div class="container-fluid px-2 user-select-none">
		<div class="sticky-top pb-2 bg-body border-bottom mb-3">
			<div class="row w-100 g-0" style="-webkit-app-region: drag;">
				<div class="col-7 pt-2">
					<i18n-text class="h2 ps-2 mastHead" data-key="app_name"></i18n-text>
				</div>
				<div class="col-5 pt-4 mt-3">
					<span class="badge bg-primary mx-auto w-100 d-block rounded-3 h4 fs-5">Mod Vault</span>
				</div>
			</div>
		</div>

		<div class="mx-2 mb-3 alert alert-secondary" id="vaultStatus">Loading mod vault...</div>

		<div class="mx-2 mb-3 card">
			<div class="card-body">
				<div class="row g-2">
					<div class="col-md-3">
						<div class="small text-body-secondary">Stored ZIP files</div>
						<div class="fs-4" id="vaultCount">0</div>
					</div>
					<div class="col-md-3">
						<div class="small text-body-secondary">Referenced by history</div>
						<div class="fs-4" id="vaultUsedCount">0</div>
					</div>
					<div class="col-md-3">
						<div class="small text-body-secondary">Total size</div>
						<div class="fs-4" id="vaultSize">0 B</div>
					</div>
					<div class="col-md-3 d-flex align-items-end">
						<button class="btn btn-sm btn-success w-100" id="vaultImportCollections" type="button">Scan collections into vault</button>
					</div>
					<div class="col-md-3 d-flex align-items-end">
						<button class="btn btn-sm btn-warning w-100" id="vaultRefreshModHub" type="button">Refresh ModHub categories</button>
					</div>
					<div class="col-md-3 d-flex align-items-end">
						<button class="btn btn-sm btn-info w-100" id="vaultBackToUpdates" type="button">Back to updates</button>
					</div>
					<div class="col-md-4">
						<label class="form-label small" for="vaultTypeFilter">Mod type</label>
						<select class="form-select form-select-sm" id="vaultTypeFilter">
							<option value="">All mod types</option>
						</select>
					</div>
					<div class="col-md-4">
						<label class="form-label small" for="vaultModHubCategoryFilter">ModHub category</label>
						<select class="form-select form-select-sm" id="vaultModHubCategoryFilter">
							<option value="">All ModHub categories</option>
						</select>
					</div>
					<div class="col-md-4">
						<label class="form-label small" for="vaultCategoryFilter">Category</label>
						<select class="form-select form-select-sm" id="vaultCategoryFilter">
							<option value="">All internal categories</option>
						</select>
					</div>
					<div class="col-md-4 d-flex align-items-end">
						<button class="btn btn-sm btn-outline-secondary w-100" id="vaultClearFilters" type="button">Clear filters</button>
					</div>
					<div class="col-12">
						<label class="form-label small" for="vaultTextFilter">Search</label>
						<input class="form-control form-control-sm" id="vaultTextFilter" placeholder="Search mod name, version, category, source, collection, or notes" type="search">
					</div>
					<div class="col-12 small text-body-secondary">
						Vault folder: <span class="vault-path user-select-text" id="vaultFolder"></span>
						<button class="btn btn-link btn-sm py-0 align-baseline" id="vaultOpenFolder" type="button">Open folder</button>
					</div>
				</div>
			</div>
		</div>

		<div class="list-group mx-2 my-3" id="vaultList"></div>
	</div>

<template id="vault_line">
	<li class="list-group-item vault-group-row">
		<div class="d-flex justify-content-between gap-3">
			<div class="d-flex gap-3 align-items-center">
				<template-var>modIcon</template-var>
				<div>
					<div class="fw-bold fs-5">
						<template-var>modName</template-var>
						<span class="badge text-bg-warning d-none vault-note-badge">Note</span>
					</div>
					<div class="small text-body-secondary"><template-var>fileCount</template-var></div>
					<div class="small text-warning mt-1 d-none vault-note-preview"></div>
				</div>
			</div>
			<div class="text-end">
				<div class="fw-bold"><template-var>totalSize</template-var></div>
				<div class="small text-body-secondary"><template-var>versionSummary</template-var></div>
			</div>
		</div>
		<div class="d-flex flex-wrap gap-2 mt-3">
			<button class="btn btn-sm btn-outline-info vault-group-toggle" type="button">Show stored ZIPs</button>
			<button class="btn btn-sm btn-outline-warning vault-note-toggle" type="button">Add note</button>
		</div>
		<div class="collapse mt-3 vault-note-panel">
			<label class="form-label small">Mod note</label>
			<textarea class="form-control vault-note-input" maxlength="5000" placeholder="Record conflicts, setup reminders, or anything else worth remembering." rows="3"></textarea>
			<div class="d-flex gap-2 mt-2">
				<button class="btn btn-sm btn-warning vault-note-save" type="button">Save note</button>
				<button class="btn btn-sm btn-outline-danger vault-note-clear" type="button">Clear note</button>
			</div>
			<div class="small mt-2 vault-note-status" role="status"></div>
		</div>
		<div class="collapse mt-3 vault-group-body"><template-var>fileRows</template-var></div>
	</li>
</template>

<template id="vault_file_row">
	<div class="border rounded p-2 mb-2 vault-file-row">
		<div class="d-flex justify-content-between gap-2">
			<div>
				<div class="fw-bold"><template-var>versionLabel</template-var></div>
				<div class="small fst-italic"><template-var>fileName</template-var></div>
			</div>
			<div class="text-end">
				<div><template-var>usedBadge</template-var><template-var>missingBadge</template-var></div>
				<div class="small"><template-var>size</template-var></div>
			</div>
		</div>
		<div class="mt-2 d-flex flex-wrap gap-1">
			<template-var>typeBadges</template-var>
			<template-var>modHubCategoryBadges</template-var>
			<template-var>categoryBadges</template-var>
			<template-var>brandBadges</template-var>
			<template-var>sourceBadges</template-var>
			<template-var>collectionBadges</template-var>
		</div>
		<div class="small mt-2 text-body-secondary"><template-var>updatedAt</template-var></div>
		<div class="row g-2 mt-2 align-items-center">
			<div class="col-md-7">
				<select class="form-select form-select-sm vault-copy-target"></select>
			</div>
			<div class="col-md-5">
				<button class="btn btn-sm btn-success w-100 vault-copy-button" type="button">
					Copy to collection
				</button>
			</div>
		</div>
		<div class="small mt-2 vault-copy-result" role="status"></div>
		<div class="mt-2">
			<button class="btn btn-sm btn-outline-secondary vault-details-toggle" type="button">
				Technical details
			</button>
		</div>
		<div class="collapse mt-2 vault-technical-details">
			<div class="small vault-path user-select-text">Version labels seen: <template-var>versionLabels</template-var></div>
			<div class="small vault-path user-select-text">ModHub categories: <template-var>modHubCategories</template-var></div>
			<div class="small vault-path user-select-text">ModHub IDs: <template-var>modHubIDs</template-var></div>
			<div class="small vault-path user-select-text">ModHub versions: <template-var>modHubVersions</template-var></div>
			<div class="small vault-path user-select-text">Game versions: <template-var>gameVersions</template-var></div>
			<div class="small vault-path user-select-text">Path: <template-var>filePath</template-var></div>
			<div class="small vault-path user-select-text">Fingerprint: <template-var>hash</template-var></div>
		</div>
	</div>
</template>

</body>
</html>
